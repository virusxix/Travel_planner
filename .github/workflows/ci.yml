name: CI

on:
  push:
    branches: [main, fix/cross-browser-compat]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (CRA build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # CRA treats lint warnings as errors when CI=true; this project has
          # known react-hooks/exhaustive-deps warnings, so don't fail on them.
          CI: "false"
          REACT_APP_BACKEND_URL: http://127.0.0.1:8000
          REACT_APP_GOOGLE_MAPS_API_KEY: ""

  backend:
    name: Backend (install + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Mirrors Render's build — proves requirements.txt installs on Linux.
      - name: Install
        run: pip install -r requirements.txt

      # No live DB/secrets in CI, so verify the app imports/compiles rather
      # than running the integration suite (which needs a running backend).
      - name: Compile
        run: python -m py_compile server.py emergentintegrations/llm/chat.py
